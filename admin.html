<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natureza Cura | Admin Dashboard</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link href="style.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

    <script src="config.js"></script>
    <script src="firebase-init.js"></script>
</head>

<body class="bg-[#F8F9FA] text-brand-green font-sans min-h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 max-w-md w-full">
            <div class="text-center mb-8">
                <i class="fa-solid fa-leaf text-brand-green text-3xl mb-4"></i>
                <h1 class="text-2xl font-serif font-semibold">Admin Login</h1>
                <p class="text-sm text-gray-500 mt-2">Área restrita Natureza Cura</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Email</label>
                    <input type="email" id="admin-email" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Senha</label>
                    <input type="password" id="admin-password" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition">
                </div>
                <p id="login-error" class="text-red-500 text-sm hidden"></p>
                <button type="submit" id="login-btn" class="w-full bg-brand-green text-brand-beige py-3 rounded-lg font-medium hover:bg-brand-green/90 transition">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen (Hidden initially) -->
    <div id="dashboard-screen" class="hidden flex-1 flex flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-100 flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-leaf text-brand-green text-xl"></i>
                    <span class="font-serif font-bold tracking-wide">Admin</span>
                </div>
                <button id="logout-btn" class="text-gray-400 hover:text-red-500 transition md:hidden" title="Sair">
                    <i class="fa-solid fa-sign-out-alt"></i>
                </button>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button data-tab="clients" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-brand-green/5 text-brand-green font-medium transition text-left">
                    <i class="fa-solid fa-users w-5"></i> Clientes
                </button>
                <button data-tab="payments" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-500 hover:bg-gray-50 transition text-left">
                    <i class="fa-solid fa-credit-card w-5"></i> Pagamentos
                </button>
                <button data-tab="calendar" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-500 hover:bg-gray-50 transition text-left">
                    <i class="fa-solid fa-calendar w-5"></i> Agenda
                </button>
            </nav>
            <div class="p-4 border-t border-gray-100 hidden md:block">
                <button id="logout-btn-desktop" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-gray-500 hover:text-red-500 transition">
                    <i class="fa-solid fa-sign-out-alt"></i> Sair do Painel
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#F8F9FA]">
            
            <!-- Header elements -->
            <header class="bg-white border-b border-gray-100 px-8 py-4 flex justify-between items-center">
                <h2 id="current-tab-title" class="text-xl font-serif font-semibold">Clientes</h2>
                
                <!-- Quick filters -->
                <div class="flex gap-2">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="global-search" placeholder="Buscar..." class="pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none w-48 md:w-64">
                    </div>
                </div>
            </header>

            <!-- Tab Contents -->
            <div class="flex-1 overflow-auto p-8 relative">
                
                <!-- Loading Overlay -->
                <div id="loading-overlay" class="absolute inset-0 bg-[#F8F9FA]/80 flex items-center justify-center z-10 hidden">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-green"></div>
                </div>

                <!-- Clients Tab -->
                <div id="tab-clients" class="tab-content">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Nome / Email</th>
                                    <th class="px-6 py-4 font-medium">Origem</th>
                                    <th class="px-6 py-4 font-medium">Data Adição</th>
                                </tr>
                            </thead>
                            <tbody id="clients-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Payments Tab -->
                <div id="tab-payments" class="tab-content hidden">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Data</th>
                                    <th class="px-6 py-4 font-medium">Cliente</th>
                                    <th class="px-6 py-4 font-medium">Serviço/Curso</th>
                                    <th class="px-6 py-4 font-medium">Valor</th>
                                    <th class="px-6 py-4 font-medium">Status</th>
                                </tr>
                            </thead>
                            <tbody id="payments-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Calendar Tab -->
                <div id="tab-calendar" class="tab-content hidden">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Data & Hora</th>
                                    <th class="px-6 py-4 font-medium">Evento</th>
                                    <th class="px-6 py-4 font-medium">Detalhes</th>
                                </tr>
                            </thead>
                            <tbody id="calendar-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Logic -->
    <script src="admin.js"></script>
</body>

</html>
