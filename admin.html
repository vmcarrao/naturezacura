<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natureza Cura | Admin Dashboard</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link href="style.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

    <script src="config.js"></script>
    <script src="firebase-init.js"></script>
</head>

<body class="bg-[#F8F9FA] text-brand-green font-sans min-h-screen flex flex-col">

    <!-- Login Screen -->
    <div id="login-screen" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 max-w-md w-full">
            <div class="text-center mb-8">
                <i class="fa-solid fa-leaf text-brand-green text-3xl mb-4"></i>
                <h1 class="text-2xl font-serif font-semibold">Admin Login</h1>
                <p class="text-sm text-gray-500 mt-2">Área restrita Natureza Cura</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Email</label>
                    <input type="email" id="admin-email" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wide text-gray-500 mb-1">Senha</label>
                    <input type="password" id="admin-password" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition">
                </div>
                <p id="login-error" class="text-red-500 text-sm hidden"></p>
                <button type="submit" id="login-btn" class="w-full bg-brand-green text-brand-beige py-3 rounded-lg font-medium hover:bg-brand-green/90 transition">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Screen (Hidden initially) -->
    <div id="dashboard-screen" class="hidden flex-1 flex flex-col h-screen overflow-hidden bg-[#F8F9FA]">
        
        <!-- Top Navigation -->
        <header class="bg-white border-b border-gray-100 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
            <!-- Brand & Mobile Logout -->
            <div class="flex justify-between items-center w-full md:w-auto">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-leaf text-brand-green text-xl"></i>
                    <span class="font-serif font-bold tracking-wide text-lg">Admin Natureza Cura</span>
                </div>
                <button id="logout-btn" class="text-gray-400 hover:text-red-500 transition md:hidden" title="Sair">
                    <i class="fa-solid fa-sign-out-alt text-lg"></i>
                </button>
            </div>

            <!-- Horizontal Tabs -->
            <nav class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 scrollbar-hide">
                <button data-tab="clients" class="tab-btn shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg bg-brand-green/5 text-brand-green font-medium transition text-sm">
                    <i class="fa-solid fa-users"></i> Clientes
                </button>
                <button data-tab="payments" class="tab-btn shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-gray-500 hover:bg-gray-50 transition text-sm">
                    <i class="fa-solid fa-credit-card"></i> Pagamentos
                </button>
                <button data-tab="calendar" class="tab-btn shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-gray-500 hover:bg-gray-50 transition text-sm">
                    <i class="fa-solid fa-calendar"></i> Agenda
                </button>
            </nav>

            <!-- Actions (Search & Logout) -->
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-auto">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="global-search" placeholder="Buscar registros..." class="w-full md:w-64 pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:border-brand-green focus:ring-1 focus:ring-brand-green outline-none transition">
                </div>
                <button id="logout-btn-desktop" class="hidden md:flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-red-500 transition shrink-0">
                    <i class="fa-solid fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col h-full overflow-hidden w-full max-w-[1600px] mx-auto">

            <!-- Tab Contents -->
            <div class="flex-1 overflow-auto p-8 relative">
                
                <!-- Loading Overlay -->
                <div id="loading-overlay" class="absolute inset-0 bg-[#F8F9FA]/80 flex items-center justify-center z-10 hidden">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-green"></div>
                </div>

                <!-- Clients Tab -->
                <div id="tab-clients" class="tab-content">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-visible shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100 select-none">
                                <tr>
                                    <th data-sort="name" data-order="asc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group w-2/5">
                                        Nome / Email <i class="fa-solid fa-sort ml-1 text-gray-300 group-hover:text-gray-500 transition sort-icon"></i>
                                    </th>
                                    <th data-sort="origin" data-order="asc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group w-2/5">
                                        Origem <i class="fa-solid fa-sort ml-1 text-gray-300 group-hover:text-gray-500 transition sort-icon"></i>
                                    </th>
                                    <th data-sort="date" data-order="desc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group w-1/5">
                                        Data Adição <i class="fa-solid fa-sort-down ml-1 text-brand-green sort-icon"></i>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="clients-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Payments Tab -->
                <div id="tab-payments" class="tab-content hidden">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-visible shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100 select-none">
                                <tr>
                                    <th data-sort="date" data-order="desc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group">
                                        Data <i class="fa-solid fa-sort-down ml-1 text-brand-green sort-icon relative z-0"></i>
                                    </th>
                                    <th data-sort="client" data-order="asc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group">
                                        Cliente <i class="fa-solid fa-sort ml-1 text-gray-300 group-hover:text-gray-500 transition sort-icon relative z-0"></i>
                                    </th>
                                    <th class="px-6 py-4 font-medium relative group">
                                        <div class="flex items-center justify-between cursor-pointer hover:bg-gray-100 transition rounded px-2 -mx-2 -my-2 py-2" id="filter-btn-service">
                                            <span>Serviço/Curso</span>
                                            <i class="fa-solid fa-filter text-gray-300 group-hover:text-gray-500 text-xs"></i>
                                        </div>
                                        <!-- Dropdown injected by JS -->
                                        <div id="filter-dropdown-service" class="hidden absolute top-full left-0 mt-1 w-56 bg-white border border-gray-200 rounded-lg shadow-lg z-10 p-2 max-h-64 overflow-y-auto"></div>
                                    </th>
                                    <th data-sort="amount" data-order="asc" class="px-6 py-4 font-medium cursor-pointer hover:bg-gray-100 transition group">
                                        Valor <i class="fa-solid fa-sort ml-1 text-gray-300 group-hover:text-gray-500 transition sort-icon relative z-0"></i>
                                    </th>
                                    <th class="px-6 py-4 font-medium relative group">
                                        <div class="flex items-center justify-between cursor-pointer hover:bg-gray-100 transition rounded px-2 -mx-2 -my-2 py-2" id="filter-btn-status">
                                            <span>Status</span>
                                            <i class="fa-solid fa-filter text-gray-300 group-hover:text-gray-500 text-xs"></i>
                                        </div>
                                        <!-- Dropdown injected by JS -->
                                        <div id="filter-dropdown-status" class="hidden absolute top-full right-0 mt-1 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-10 p-2"></div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="payments-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Calendar Tab -->
                <div id="tab-calendar" class="tab-content hidden">
                    <div class="bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-500 border-b border-gray-100">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Data & Hora</th>
                                    <th class="px-6 py-4 font-medium">Evento</th>
                                    <th class="px-6 py-4 font-medium">Detalhes</th>
                                </tr>
                            </thead>
                            <tbody id="calendar-tbody" class="divide-y divide-gray-100">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Logic -->
    <script src="admin.js"></script>
</body>

</html>
